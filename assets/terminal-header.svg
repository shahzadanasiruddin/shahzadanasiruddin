<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&amp;display=swap');

      .bg { fill: #0a0e14; }

      .win-dot { }
      .win-red { fill: #ff5f56; }
      .win-yellow { fill: #ffbd2e; }
      .win-green { fill: #27c93f; }

      .titlebar { fill: #12161f; }
      .titlebar-text {
        font-family: 'Fira Code', monospace;
        font-size: 13px;
        fill: #6b7280;
        letter-spacing: 1px;
      }

      .prompt {
        font-family: 'Fira Code', monospace;
        font-size: 18px;
        fill: #27c93f;
      }

      .path {
        font-family: 'Fira Code', monospace;
        font-size: 18px;
        fill: #61afef;
      }

      .cmd {
        font-family: 'Fira Code', monospace;
        font-size: 18px;
        fill: #e6e6e6;
      }

      .name {
        font-family: 'Fira Code', monospace;
        font-size: 40px;
        font-weight: 700;
        fill: #ffffff;
      }

      .name-accent {
        fill: #61afef;
      }

      .role {
        font-family: 'Fira Code', monospace;
        font-size: 18px;
        fill: #98c379;
      }

      .comment {
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        fill: #5c6370;
      }

      .cursor {
        fill: #61afef;
        animation: blink 1s steps(1) infinite;
      }

      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      .type-line {
        animation: fadeIn 0.6s ease-out forwards;
      }
      .l1 { animation-delay: 0.1s; opacity: 0; }
      .l2 { animation-delay: 0.6s; opacity: 0; }
      .l3 { animation-delay: 1.1s; opacity: 0; }
      .l4 { animation-delay: 1.6s; opacity: 0; }

      @keyframes fadeIn {
        to { opacity: 1; }
      }
    </style>
  </defs>

  <rect class="bg" width="800" height="250" rx="12" />

  <!-- Title bar -->
  <path class="titlebar" d="M0,12 C0,5.4 5.4,0 12,0 L788,0 C794.6,0 800,5.4 800,12 L800,40 L0,40 Z" />
  <circle class="win-dot win-red" cx="24" cy="20" r="6" />
  <circle class="win-dot win-yellow" cx="46" cy="20" r="6" />
  <circle class="win-dot win-green" cx="68" cy="20" r="6" />
  <text class="titlebar-text" x="400" y="25" text-anchor="middle">shahzada@portfolio: ~/dev</text>

  <!-- Terminal content -->
  <g transform="translate(40, 75)">
    <text class="type-line l1">
      <tspan class="prompt">➜ </tspan><tspan class="path">~/dev </tspan><tspan class="cmd">whoami</tspan>
    </text>

    <text class="name type-line l2" x="0" y="55">
      SHAHZADA<tspan class="name-accent"> NASIR</tspan> UDDIN
    </text>

    <text class="type-line l3" x="0" y="95">
      <tspan class="prompt">➜ </tspan><tspan class="path">~/dev </tspan><tspan class="cmd">cat role.txt</tspan>
    </text>

    <text class="role type-line l4" x="0" y="128">
      Full Stack Developer // Building things end-to-end<tspan class="cursor">▊</tspan>
    </text>

    <text class="comment type-line l4" x="0" y="150">
      # based in  Pakistan
    </text>
  </g>
</svg>
